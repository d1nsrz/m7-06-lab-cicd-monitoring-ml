name: Deploy Vision Moderation Model

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

# ─── helpers ──────────────────────────────────────────────────────────────────
# run_script SCRIPT [ARGS…]
#   • Makes the script executable if it exists
#   • Exits 0 with a warning if the script is absent (lab repos may not have all stubs)
#   • Exits with the script's own exit code otherwise

jobs:
  # ── 1. LINT ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint OpenAPI + Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node for OpenAPI linting
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint OpenAPI spec
        run: |
          SPEC=$(find . \
            \( -name 'openapi.yaml' -o -name 'openapi.json' \
               -o -name 'openapi.yml' \
               -o -name 'api.yaml'   -o -name 'api.json' \
               -o -name 'swagger.yaml' -o -name 'swagger.json' \
            \) \
            -not -path '*/node_modules/*' \
            -not -path '*/.git/*' \
            | head -n 1)
          if [ -z "$SPEC" ]; then
            echo "::warning::No OpenAPI spec found — skipping lint."
            exit 0
          fi
          echo "Linting $SPEC"
          npx --yes @redocly/cli lint "$SPEC"

      - name: Lint Dockerfile with hadolint
        run: |
          DF=$(find . \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) \
            -not -path '*/node_modules/*' -not -path '*/.git/*' | head -n 1)
          if [ -z "$DF" ]; then
            echo "::warning::No Dockerfile found — skipping hadolint."
            exit 0
          fi
          echo "Linting $DF"
          docker run --rm -i hadolint/hadolint < "$DF"

  # ── 2. TEST ──────────────────────────────────────────────────────────────────
  test:
    name: Unit + Contract Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: find ./scripts -name '*.sh' -exec chmod +x {} + 2>/dev/null || true

      - name: Run unit tests
        run: |
          if [ ! -f ./scripts/test-unit.sh ]; then
            echo "::warning::scripts/test-unit.sh not found — skipping."
            exit 0
          fi
          bash ./scripts/test-unit.sh

      - name: Run contract tests
        run: |
          if [ ! -f ./scripts/test-contract.sh ]; then
            echo "::warning::scripts/test-contract.sh not found — skipping."
            exit 0
          fi
          bash ./scripts/test-contract.sh

  # ── 3. BUILD ─────────────────────────────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_built: ${{ steps.find-df.outputs.image_built }}
    steps:
      - uses: actions/checkout@v4

      - name: Locate Dockerfile
        id: find-df
        run: |
          DF=$(find . -iname 'dockerfile' -o -iname 'dockerfile.*' 2>/dev/null \
            | grep -v node_modules | grep -v '.git/' | head -n 1)
          if [ -z "$DF" ]; then
            echo "::warning::No Dockerfile found — skipping image build."
            echo "image_built=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found Dockerfile at $DF"
            echo "path=$DF"    >> "$GITHUB_OUTPUT"
            echo "image_built=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.find-df.outputs.image_built == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image
        if: steps.find-df.outputs.image_built == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.find-df.outputs.path }}
          push: false
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        if: steps.find-df.outputs.image_built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-tar
          path: /tmp/image.tar
          retention-days: 1

  # ── 4. SCAN ──────────────────────────────────────────────────────────────────
  scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.image_built == 'true'
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tar
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy scan — fail on HIGH or CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: false
          severity: HIGH,CRITICAL
          vuln-type: os,library

  # ── 5. PUSH ──────────────────────────────────────────────────────────────────
  push:
    name: Push Image to GHCR
    runs-on: ubuntu-latest
    needs: [scan, build]
    if: needs.build.outputs.image_built == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tar
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

  # ── 6. DEPLOY STAGING ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: find ./scripts -name '*.sh' -exec chmod +x {} + 2>/dev/null || true

      - name: Deploy to staging
        run: |
          if [ ! -f ./scripts/deploy.sh ]; then
            echo "::warning::scripts/deploy.sh not found — skipping."
            exit 0
          fi
          bash ./scripts/deploy.sh staging "$IMAGE_TAG"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

  # ── 7. SMOKE TEST STAGING ────────────────────────────────────────────────────
  smoke-staging:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: find ./scripts -name '*.sh' -exec chmod +x {} + 2>/dev/null || true

      - name: Run smoke tests against staging
        run: |
          if [ ! -f ./scripts/smoke.sh ]; then
            echo "::warning::scripts/smoke.sh not found — skipping."
            exit 0
          fi
          bash ./scripts/smoke.sh staging
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}

  # ── 8. DEPLOY PRODUCTION ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production (Canary → Full)
    runs-on: ubuntu-latest
    needs: smoke-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production      # required-approver gate enforced here
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Make scripts executable
        run: find ./scripts -name '*.sh' -exec chmod +x {} + 2>/dev/null || true

      - name: Canary rollout — 10%
        run: |
          if [ ! -f ./scripts/deploy.sh ]; then
            echo "::warning::scripts/deploy.sh not found — skipping canary."
            exit 0
          fi
          bash ./scripts/deploy.sh production "$IMAGE_TAG" --canary 10
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Verify canary
        run: |
          if [ ! -f ./scripts/canary-verify.sh ]; then
            echo "::warning::scripts/canary-verify.sh not found — skipping verification."
            exit 0
          fi
          bash ./scripts/canary-verify.sh production "$IMAGE_TAG"
        env:
          PROD_URL: ${{ vars.PROD_URL }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Full rollout
        run: |
          if [ ! -f ./scripts/deploy.sh ]; then
            echo "::warning::scripts/deploy.sh not found — skipping full rollout."
            exit 0
          fi
          bash ./scripts/deploy.sh production "$IMAGE_TAG" --full
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
