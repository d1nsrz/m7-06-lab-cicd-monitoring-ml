name: Deploy Vision Moderation Model

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint OpenAPI + Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node for OpenAPI linting
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint OpenAPI spec
        run: |
          SPEC=$(find . \
            \( -name 'openapi.yaml' -o -name 'openapi.json' \
               -o -name 'openapi.yml' \
               -o -name 'api.yaml'   -o -name 'api.json' \
               -o -name 'swagger.yaml' -o -name 'swagger.json' \
            \) \
            -not -path '*/node_modules/*' \
            -not -path '*/.git/*' \
            | head -n 1)
          if [ -z "$SPEC" ]; then
            echo "::warning::No OpenAPI spec found — skipping lint."
            exit 0
          fi
          echo "Linting $SPEC"
          npx --yes @redocly/cli lint "$SPEC"

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  test:
    name: Unit + Contract Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: ./scripts/test-unit.sh

      - name: Run contract tests
        run: ./scripts/test-contract.sh

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tar
          path: /tmp/image.tar
          retention-days: 1

  scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tar
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy scan — fail on HIGH or CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: false
          severity: HIGH,CRITICAL
          vuln-type: os,library

  push:
    name: Push Image to GHCR
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tar
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: ./scripts/deploy.sh staging ${{ env.IMAGE_TAG }}
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

  smoke-staging:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests against staging
        run: ./scripts/smoke.sh staging
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}

  deploy-production:
    name: Deploy to Production (Canary → Full)
    runs-on: ubuntu-latest
    needs: smoke-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production      # required approvers gate enforced here
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Canary rollout — 10%
        run: ./scripts/deploy.sh production ${{ env.IMAGE_TAG }} --canary 10
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Verify canary
        run: ./scripts/canary-verify.sh production ${{ env.IMAGE_TAG }}
        env:
          PROD_URL: ${{ vars.PROD_URL }}

      - name: Full rollout
        run: ./scripts/deploy.sh production ${{ env.IMAGE_TAG }} --full
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
